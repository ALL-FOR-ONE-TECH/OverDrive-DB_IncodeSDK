name: Publish All SDKs — v1.3.0

# Triggered by pushing a version tag: git tag v1.3.0 && git push --tags
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

# ── Shared retry / timeout defaults ──────────────────────
defaults:
  run:
    # All runs get 3 retries via the step-level retry action
    shell: bash

jobs:
  # ─── npm ───────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout (with retry)
        uses: actions/checkout@v4
        # Retry up to 3 times on network errors (502, timeout etc.)
        timeout-minutes: 5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        # root of this repo IS the IncodeSDK — subdirs are nodejs/, python/ etc.
        working-directory: nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── PyPI ──────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build and publish
        working-directory: python
        run: |
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ─── crates.io ─────────────────────────────────────────
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # NOTE: if this 502s, re-run the workflow from GitHub Actions UI

      - name: Publish
        # Cargo.toml is in the repo root (IncodeSDK ≡ repo root)
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty

  # ─── Java / Maven → GitHub Packages ───────────────────
  publish-github-packages:
    name: Publish to GitHub Packages (Java)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: java   # reads java/settings.xml

      - name: Publish with Maven
        working-directory: java
        run: mvn deploy -s settings.xml -DskipTests -Dgpg.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Native library (liboverdrive) build ──────────────
  build-native-linux:
    name: Build native library (Linux x64)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Linux x64 target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Install cross-compile deps
        run: sudo apt-get update && sudo apt-get install -y gcc-x86-64-linux-gnu

      - name: Build release library
        # Cargo.toml is at repo root — no cd needed
        run: cargo build --release --target x86_64-unknown-linux-gnu
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: x86_64-linux-gnu-gcc

      - name: Upload liboverdrive.so
        uses: actions/upload-artifact@v4
        with:
          name: liboverdrive-linux-x64
          path: target/x86_64-unknown-linux-gnu/release/liboverdrive.so

  # ─── Docs ──────────────────────────────────────────────
  deploy-docs:
    name: Deploy Documentation Site
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs-site/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
