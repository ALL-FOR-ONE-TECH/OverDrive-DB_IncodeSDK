name: Publish All SDKs — v1.4

# Manual trigger or tag push.
# For a full release (build + test + publish), use sdk-release.yml instead.
# This workflow is for re-publishing packages without rebuilding native libs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.4.0)'
        required: false
        default: ''

defaults:
  run:
    shell: bash

jobs:
  # ─── npm ───────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: nodejs
        run: |
          echo "Package: $(node -p \"require('./package.json').name\")"
          echo "Version: $(node -p \"require('./package.json').version\")"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── PyPI ──────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and publish
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ─── Java / Maven → GitHub Packages ───────────────────────
  publish-maven:
    name: Publish to GitHub Packages (Java)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Publish with Maven
        working-directory: java
        run: |
          echo "Publishing com.afot:overdrive-db:$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          mvn -B deploy -s settings.xml -DskipTests -Dgpg.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── crates.io ─────────────────────────────────────────────
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty

  # ─── Documentation ─────────────────────────────────────────
  deploy-docs:
    name: Deploy Documentation Site
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs-site/'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
