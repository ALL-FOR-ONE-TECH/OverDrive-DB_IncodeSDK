name: Publish All SDKs

# Trigger: push a version tag like v1.3.0
# Example:
#   git tag v1.3.0
#   git push origin v1.3.0
#
# For dry-run (no actual publish), trigger via workflow_dispatch and set dry_run=true
#
# Required Secrets:
#   NPM_TOKEN            — npm Automation token
#   PYPI_API_TOKEN       — PyPI token (pypi-...)
#   CRATES_IO_TOKEN      — crates.io API token
#   GITHUB_TOKEN         — auto-provided (Maven + Go)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish, just verify)'
        required: false
        default: 'false'
      version:
        description: 'Version to publish (e.g. 1.3.0)'
        required: false
        default: '1.3.0'

env:
  SDK_VERSION: ${{ github.event.inputs.version || '1.3.0' }}

jobs:
  # ─────────────────────────────────────────────
  # 1. NODE.JS → npm
  # ─────────────────────────────────────────────
  publish-npm:
    name: 📦 Node.js → npm
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json version
        working-directory: nodejs
        run: |
          PKG_VER=$(node -e "console.log(require('./package.json').version)")
          echo "package.json version: $PKG_VER"
          echo "✅ Node.js SDK version: $PKG_VER"

      - name: Validate syntax
        working-directory: nodejs
        run: node --check index.js && echo "✅ Syntax OK"

      - name: Install dependencies
        working-directory: nodejs
        run: npm install --ignore-scripts

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: nodejs
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────
  # 2. PYTHON → PyPI
  # ─────────────────────────────────────────────
  publish-pypi:
    name: 🐍 Python → PyPI
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Verify pyproject.toml version
        working-directory: python
        run: |
          VER=$(python -c "import re; print(re.search(r'version\s*=\s*\"(.+?)\"', open('pyproject.toml').read()).group(1))")
          echo "pyproject.toml version: $VER"
          echo "✅ Python SDK version: $VER"

      - name: Validate syntax
        run: python -c "import ast; ast.parse(open('python/overdrive/__init__.py').read()); print('✅ Python syntax OK')"

      - name: Build distribution
        working-directory: python
        run: python -m build

      - name: Check distribution
        working-directory: python
        run: twine check dist/*

      - name: Publish to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: python
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: List dist (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: python
        run: ls -lh dist/ && echo "✅ Dry run: dist built OK"

  # ─────────────────────────────────────────────
  # 3. RUST → crates.io
  # ─────────────────────────────────────────────
  publish-crates-io:
    name: 🦀 Rust → crates.io
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify Cargo.toml version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "Cargo.toml version: $VER"
          echo "✅ Rust SDK version: $VER"

      - name: Check (verify compiles clean)
        run: cargo check

      - name: Publish to crates.io
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: cargo publish --dry-run

  # ─────────────────────────────────────────────
  # 4. JAVA → GitHub Packages (Maven)
  # ─────────────────────────────────────────────
  publish-github-packages:
    name: ☕ Java → GitHub Packages
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: java

      - name: Verify pom.xml version
        working-directory: java
        run: |
          VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "pom.xml version: $VER"
          echo "✅ Java SDK version: $VER"

      - name: Compile (verify builds clean)
        working-directory: java
        run: mvn compile -q -DskipTests

      - name: Deploy to GitHub Packages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: java
        run: mvn --batch-mode deploy -DskipTests -Dgpg.skip=true -s settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package JAR (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: java
        run: mvn package -DskipTests -q && echo "✅ JAR built OK (dry run)"

  # ─────────────────────────────────────────────
  # 5. GO → GitHub module tag
  # ─────────────────────────────────────────────
  publish-go:
    name: 🐹 Go → GitHub module tag
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Verify go.mod
        working-directory: go
        run: cat go.mod && echo "✅ go.mod OK"

      - name: Verify Go syntax
        working-directory: go
        run: go vet ./... 2>&1 | grep -v "cgo\|cannot find\|ld:" || true && echo "✅ Go syntax check done"

      - name: Push Go module sub-directory tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          GO_TAG="go/${TAG_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only create if it doesn't exist
          if git rev-parse "$GO_TAG" >/dev/null 2>&1; then
            echo "Tag $GO_TAG already exists — skipping"
          else
            git tag "$GO_TAG"
            git push origin "$GO_TAG"
            echo "✅ Pushed Go module tag: $GO_TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 6. DOCS → GitHub Pages
  # ─────────────────────────────────────────────
  deploy-docs:
    name: 📚 Deploy Documentation Site
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check docs-site exists
        id: check_docs
        run: |
          if [ -d "docs-site" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ docs-site/ directory not found — skipping Pages deploy"
          fi

      - name: Upload to GitHub Pages
        if: steps.check_docs.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs-site/'

      - name: Deploy to GitHub Pages
        if: steps.check_docs.outputs.exists == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────
  # 7. SUMMARY → GitHub Release notes update
  # ─────────────────────────────────────────────
  update-release:
    name: 📝 Update Release Notes
    needs: [publish-npm, publish-pypi, publish-crates-io, publish-github-packages, publish-go]
    if: always() && github.event.inputs.dry_run != 'true' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: ver
        run: echo "ver=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Release body
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "OverDrive InCode SDK v${{ steps.ver.outputs.ver }} — Security Release 🔐"
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          fail_on_unmatched_files: false
          body: |
            ## OverDrive InCode SDK v${{ steps.ver.outputs.ver }}

            ### 🔐 What's New — Security Hardening

            **🔴 CRITICAL**
            - `open_encrypted(path, "ODB_KEY")` — AES key from env var, zeroed from RAM (`SecretKey` + `zeroize`)
            - `backup(dest)` — encrypted offsite backup with auto permission hardening

            **🟠 HIGH**
            - `query_safe(sql, params)` — parameterized queries with SQL injection blocking
            - Thread-safe wrappers: `SharedDB` (Rust), `SafeDB` (Go), `ThreadSafeOverDrive` (Python), `SharedOverDrive` (Node.js), `OverDriveSafe` (Java)

            **🟡 MEDIUM**
            - Auto `chmod 600` / Windows ACL hardening on every `open()`
            - `cleanup_wal()` — deletes stale WAL after commit (prevents replay attacks)

            ### 📦 Install

            | Language | Command |
            |---|---|
            | **Rust** | `cargo add overdrive-db@${{ steps.ver.outputs.ver }}` |
            | **Python** | `pip install overdrive-db==${{ steps.ver.outputs.ver }}` |
            | **Node.js** | `npm install overdrive-db@${{ steps.ver.outputs.ver }}` |
            | **Java** | `com.afot:overdrive-db:${{ steps.ver.outputs.ver }}` |
            | **Go** | `go get github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/go@v${{ steps.ver.outputs.ver }}` |

            ### 🔐 Security Quick Start
            ```rust
            // Never hardcode keys! Load from env:
            // $env:ODB_KEY = "my-32-char-secret-key!!!!!!!!!!!!!"
            let mut db = OverDriveDB::open_encrypted("app.odb", "ODB_KEY")?;
            let rows = db.query_safe("SELECT * FROM users WHERE name = ?", &[user_input])?;
            db.backup("offsite/backup.odb")?;
            db.cleanup_wal()?;
            ```

            See the [Security Model docs](https://github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/blob/main/docs/architecture.md#security-model) for full details.
