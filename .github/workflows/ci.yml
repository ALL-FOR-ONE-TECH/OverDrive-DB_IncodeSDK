name: SDK Continuous Integration

on:
  push:
    branches: [ main ]
    paths: [ 'IncodeSDK/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'IncodeSDK/**' ]

jobs:
  rust-test:
    name: Rust (SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build & Test
        run: |
          cd IncodeSDK
          cargo check
          cargo test --lib

  nodejs-lint:
    name: Node.js (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd IncodeSDK/nodejs
          npm install
      - name: Check syntax
        run: |
          cd IncodeSDK/nodejs
          node --check index.js

  python-build:
    name: Python (Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install build
        run: pip install build
      - name: Verify build
        run: |
          cd IncodeSDK/python
          python -m build

  java-build:
    name: Java (Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          cd IncodeSDK/java
          mvn compile
