name: Build & Release SDK — v1.4

# Runs on the OverDrive-DB_SDK repo (root = SDK, no IncodeSDK/ subdirectory)
#
# Pipeline:
#   1. test    — All SDK tests must pass (gate)
#   2. build   — Build native cdylib for all 5 platforms
#   3. release — Publish binaries + checksums to GitHub Releases
#   4. publish — Publish SDK packages to npm, PyPI, Maven, Go

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.4.0)'
        required: true
        default: 'v1.4.0'

env:
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────
# JOB 1 — TEST GATE
# All SDK tests must pass before any release build starts.
# ─────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test — ${{ matrix.name }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # Rust SDK
          - name: "Rust / ubuntu"
            os: ubuntu-latest
            job: rust
          - name: "Rust / windows"
            os: windows-latest
            job: rust
          - name: "Rust / macos"
            os: macos-latest
            job: rust

          # Node.js SDK
          - name: "Node.js 18"
            os: ubuntu-latest
            job: nodejs
            node: '18'
          - name: "Node.js 20"
            os: ubuntu-latest
            job: nodejs
            node: '20'

          # Python SDK
          - name: "Python 3.10"
            os: ubuntu-latest
            job: python
            python: '3.10'
          - name: "Python 3.12"
            os: ubuntu-latest
            job: python
            python: '3.12'

          # Java SDK
          - name: "Java 17"
            os: ubuntu-latest
            job: java
            java: '17'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────
      - name: Install Rust toolchain
        if: matrix.job == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: matrix.job == 'rust'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}

      - name: Rust — cargo check + unit tests
        if: matrix.job == 'rust'
        run: |
          cargo check
          cargo test --lib -- --test-threads=1

      # ── Node.js ───────────────────────────────────────────
      - name: Setup Node.js
        if: matrix.job == 'nodejs'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Node.js — install + test
        if: matrix.job == 'nodejs'
        working-directory: nodejs
        run: |
          npm install
          node --check index.js
          node test/test_v14.js

      # ── Python ────────────────────────────────────────────
      - name: Setup Python
        if: matrix.job == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Python — install + test + build
        if: matrix.job == 'python'
        working-directory: python
        run: |
          pip install pytest build
          python -m pytest tests/test_error_handling.py \
                           tests/test_helper_methods.py \
                           tests/test_ram_engine.py \
                           tests/test_transaction_callback.py \
                           tests/test_watchdog.py \
                           -v --tb=short
          python -m build

      # ── Java ──────────────────────────────────────────────
      - name: Setup JDK
        if: matrix.job == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Java — compile
        if: matrix.job == 'java'
        working-directory: java
        run: mvn -B compile -Dmaven.test.skip=true

# ─────────────────────────────────────────────────────────────
# JOB 2 — BUILD NATIVE LIBRARY (all 5 platforms)
# Runs only after ALL test jobs pass.
# ─────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.asset_name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 — static CRT embedded (no vcruntime140 needed)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            built_name: overdrive.dll
            asset_name: overdrive-windows-x64.dll
            rustflags: "-C target-feature=+crt-static"

          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            built_name: liboverdrive.so
            asset_name: liboverdrive-linux-x64.so
            rustflags: ""

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            built_name: liboverdrive.so
            asset_name: liboverdrive-linux-arm64.so
            rustflags: ""

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            built_name: liboverdrive.dylib
            asset_name: liboverdrive-macos-arm64.dylib
            rustflags: ""

          # macOS x64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            built_name: liboverdrive.dylib
            asset_name: liboverdrive-macos-x64.dylib
            rustflags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: Build release cdylib
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --lib --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${{ matrix.built_name }}"

          if [ ! -f "$src" ]; then
            echo "❌ Build output not found: $src"
            ls -la "target/${{ matrix.target }}/release/" || true
            exit 1
          fi

          cp "$src" "dist/${{ matrix.asset_name }}"
          echo "✅ Staged: dist/${{ matrix.asset_name }} ($(du -sh dist/${{ matrix.asset_name }} | cut -f1))"

      # Produce a generic overdrive.dll alias on Windows
      - name: Produce overdrive.dll alias (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp "dist/${{ matrix.asset_name }}" "dist/overdrive.dll"
          echo "✅ Also staged: dist/overdrive.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/

# ─────────────────────────────────────────────────────────────
# JOB 3 — CREATE GITHUB RELEASE
# Runs only after ALL builds succeed.
# ─────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten into dist/
        run: |
          mkdir -p dist
          find artifacts/ -type f | while read f; do
            cp "$f" "dist/$(basename $f)"
          done
          echo "=== dist/ ==="
          ls -lah dist/

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum $(ls *.dll *.so *.dylib 2>/dev/null) > checksums-sha256.txt || true
          cat checksums-sha256.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }} — OverDrive InCode SDK"
          body: |
            ## OverDrive InCode SDK ${{ steps.version.outputs.tag }}

            **Embeddable hybrid SQL+NoSQL database — like SQLite for JSON.**

            > ✅ All SDK tests passed on GitHub Actions before this release.

            ---

            ### 📦 Downloads

            | File | Platform |
            |---|---|
            | `overdrive.dll` | Windows x64 (generic name) |
            | `overdrive-windows-x64.dll` | Windows x64 (static CRT — no vcruntime140 needed) |
            | `liboverdrive-linux-x64.so` | Linux x64 |
            | `liboverdrive-linux-arm64.so` | Linux ARM64 |
            | `liboverdrive-macos-arm64.dylib` | macOS ARM64 (Apple Silicon) |
            | `liboverdrive-macos-x64.dylib` | macOS Intel x64 |

            ---

            ### 🔐 Checksums (SHA-256)
            See `checksums-sha256.txt` below.

            ### 📖 Documentation
            - [Quick Start](https://github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/blob/main/docs/quickstart.md)
            - [API Reference](https://github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/blob/main/docs/api-reference.md)
            - [Migration Guide v1.3 → v1.4](https://github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/blob/main/docs/migration-v1.3-to-v1.4.md)

            ### 📦 Install via package managers
            ```bash
            pip install overdrive-db          # Python
            npm install overdrive-db          # Node.js
            go get github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/go@${{ steps.version.outputs.tag }}
            ```
          files: |
            dist/overdrive.dll
            dist/overdrive-windows-x64.dll
            dist/liboverdrive-linux-x64.so
            dist/liboverdrive-linux-arm64.so
            dist/liboverdrive-macos-arm64.dylib
            dist/liboverdrive-macos-x64.dylib
            dist/checksums-sha256.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false

# ─────────────────────────────────────────────────────────────
# JOB 4 — PUBLISH SDK PACKAGES
# Runs after release is created.
# ─────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: nodejs
        run: |
          echo "Publishing $(node -p \"require('./package.json').name\")@$(node -p \"require('./package.json').version\")"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and publish
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-maven:
    name: Publish to GitHub Packages (Java)
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: java

      - name: Publish with Maven
        working-directory: java
        run: mvn -B deploy -s settings.xml -DskipTests -Dgpg.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docs:
    name: Deploy Documentation Site
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs-site/'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
