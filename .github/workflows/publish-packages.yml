name: Publish SDK Packages

# Manual trigger — publish specific packages to PyPI and/or npm.
# For a full release (build + test + publish), use sdk-release.yml instead.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.4.0)'
        required: true
        default: '1.4.0'
      publish_pypi:
        description: 'Publish to PyPI'
        type: boolean
        default: true
      publish_npm:
        description: 'Publish to npm'
        type: boolean
        default: true
      publish_maven:
        description: 'Publish to GitHub Packages (Java)'
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────
  # Publish Python SDK to PyPI
  # ─────────────────────────────────────────────
  publish-pypi:
    if: ${{ github.event.inputs.publish_pypi == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update version in pyproject.toml
        working-directory: python
        run: |
          sed -i 's/^version = ".*"/version = "${{ github.event.inputs.version }}"/' pyproject.toml
          echo "Version set to: $(grep '^version' pyproject.toml)"

      - name: Build package
        working-directory: python
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        working-directory: python
        run: |
          pip install twine
          twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ─────────────────────────────────────────────
  # Publish Node.js SDK to npm
  # ─────────────────────────────────────────────
  publish-npm:
    if: ${{ github.event.inputs.publish_npm == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update version in package.json
        working-directory: nodejs
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Publish to npm
        working-directory: nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────
  # Publish Java SDK to GitHub Packages
  # ─────────────────────────────────────────────
  publish-maven:
    if: ${{ github.event.inputs.publish_maven == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: java

      - name: Update version in pom.xml
        working-directory: java
        run: mvn -B versions:set -DnewVersion=${{ github.event.inputs.version }} -DgenerateBackupPoms=false

      - name: Publish with Maven
        working-directory: java
        run: mvn -B deploy -s settings.xml -DskipTests -Dgpg.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
